name: snapshot-frontend

# One-off helper: pull the LIVE frontend source from the VPS into the repo so
# version control matches what's actually deployed (SECURITY-HARDENING.md #4).
# It only READS from the server (tar over SSH) — it never writes to the VPS or
# touches the running app. Runs automatically when this file is pushed to the
# working branch, and can be re-run manually from the Actions tab.

on:
  push:
    branches: [claude/magical-hawking-sn2uta]
    paths: ['.github/workflows/snapshot-frontend.yml']
  workflow_dispatch:

concurrency:
  group: snapshot-frontend
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: claude/magical-hawking-sn2uta

      - name: Set up deploy SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Pull live frontend source (tar over SSH, read-only)
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "tar czf - -C /var/www/flowpost/frontend --exclude=node_modules --exclude=dist --exclude=.vite ." \
            > /tmp/live_frontend.tgz
          mkdir -p /tmp/live_frontend
          tar xzf /tmp/live_frontend.tgz -C /tmp/live_frontend
          echo "== Pulled tree =="
          find /tmp/live_frontend -maxdepth 2 -type f | sort | head -60
          # Sanity check: refuse to proceed if the pull looks empty/wrong.
          if [ ! -f /tmp/live_frontend/index.html ] && [ ! -f /tmp/live_frontend/src/main.jsx ]; then
            echo "ERROR: live frontend source not found at /var/www/flowpost/frontend" >&2
            exit 1
          fi
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Mirror live source into repo frontend/
        run: |
          set -euo pipefail
          rsync -a --delete --exclude node_modules --exclude dist --exclude .vite \
            /tmp/live_frontend/ frontend/

      - name: Commit & push snapshot
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A frontend
          if git diff --cached --quiet; then
            echo "No differences — repo frontend already matches the VPS."
            exit 0
          fi
          git commit -m "Snapshot live frontend source from VPS"
          git push origin HEAD:claude/magical-hawking-sn2uta
          {
            echo "### Live frontend source pulled into the branch"
            echo ""
            echo "Files changed:"
            echo '```'
            git show --stat --oneline HEAD | head -80
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
