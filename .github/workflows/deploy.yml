name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run DB migrations'
        required: false
        default: 'true'
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          envs: RUN_MIGRATIONS
          script: |
            set -euo pipefail
            APP=/var/www/flowpost
            RUN_MIGRATIONS="${RUN_MIGRATIONS:-true}"
            echo "==> Pulling latest code"
            cd "$APP"
            BRANCH=claude/affectionate-dijkstra-ked6ul
            if [ ! -d "$APP/.git" ]; then git init && git remote add origin https://github.com/sanmidawodu/flomipost.git; fi
            rm -f "$APP/FETCH_HEAD"
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH" || git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            if [[ "$RUN_MIGRATIONS" == "true" ]]; then
              echo "==> Running migrations"
              mariadb -u root flowpost -e "CREATE TABLE IF NOT EXISTS _migrations (id INT AUTO_INCREMENT PRIMARY KEY, name VARCHAR(255) NOT NULL, applied_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP, UNIQUE KEY uq_name (name))" || echo "  WARN: could not ensure _migrations table"
              for f in "$APP"/backend/migrations/*.sql; do
                fname=$(basename "$f")
                applied=$(mariadb -u root flowpost -sse "SELECT COUNT(*) FROM _migrations WHERE name='$fname' LIMIT 1" 2>/dev/null || echo 0)
                if [[ "$applied" -eq 0 ]]; then
                  echo "  Applying $fname"
                  if out=$(mariadb -u root flowpost < "$f" 2>&1); then mariadb -u root flowpost -e "INSERT IGNORE INTO _migrations (name) VALUES ('$fname')" || true; else echo "  WARN: $fname failed: $out"; fi
                else
                  echo "  Skipping $fname (already applied)"
                fi
              done
            fi
            echo "==> Building frontend"
            cd "$APP/frontend"
            npm install --prefer-offline
            npm run build
            echo "==> Reloading services"
            systemctl reload php8.3-fpm 2>/dev/null || systemctl reload php8.2-fpm 2>/dev/null || true
            nginx -t && systemctl reload nginx
            echo "==> Done"
        env:
          RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations || 'true' }}
