name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run DB migrations'
        required: false
        default: 'true'
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: RUN_MIGRATIONS
          script: |
            set -euo pipefail
            APP=/var/www/flowpost
            RUN_MIGRATIONS="${RUN_MIGRATIONS:-true}"

            echo "==> Pulling latest code"
            cd "$APP"
            BRANCH=claude/affectionate-dijkstra-ked6ul
            if [ ! -d "$APP/.git" ]; then
              git init
              git remote add origin https://github.com/sanmidawodu/flomipost.git
            fi
            rm -f "$APP/FETCH_HEAD"
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH" --

            if [[ "$RUN_MIGRATIONS" == "true" ]]; then
              echo "==> Running migrations"
              for f in "$APP"/backend/migrations/*.sql; do
                fname=$(basename "$f")
                applied=$(mysql -u root flowpost \
                  -sse "SELECT COUNT(*) FROM _migrations WHERE name='$fname' LIMIT 1" 2>/dev/null || echo 0)
                if [[ "$applied" -eq 0 ]]; then
                  echo "  Applying $fname"
                  mysql -u root flowpost < "$f"
                  mysql -u root flowpost \
                    -e "INSERT IGNORE INTO _migrations (name, applied_at) VALUES ('$fname', NOW())"
                else
                  echo "  Skipping $fname (already applied)"
                fi
              done
            fi

            echo "==> Building frontend"
            cd "$APP/frontend"
            npm ci --prefer-offline
            npm run build

            echo "==> Reloading services"
            systemctl reload php8.3-fpm 2>/dev/null || systemctl reload php8.2-fpm 2>/dev/null || true
            nginx -t && systemctl reload nginx

            echo "==> Done"
        env:
          RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations || 'true' }}
