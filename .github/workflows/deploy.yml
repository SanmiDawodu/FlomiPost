name: deploy

# Manual, frontend-only deploy.
#
# The previous version ran `git reset --hard` over the whole /var/www/flowpost
# repo (to a fixed branch) on every push to main, then auto-applied DB
# migrations. That could silently revert the live frontend, reset the backend
# to stale committed code, and run migrations unattended.
#
# This version syncs ONLY the frontend source for the chosen ref and rebuilds it
# in place (vite writes to /var/www/flowpost/public, the web root). It never
# touches the backend, the server's git state, node_modules, or the database.
#
# Backend + migration deploys are intentionally out of scope until the backend
# is tracked in this repo and verified against production. Run migrations
# manually in the meantime.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/ref whose frontend to deploy'
        required: false
        default: 'claude/affectionate-dijkstra-ked6ul'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the ref to deploy
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'claude/affectionate-dijkstra-ked6ul' }}

      - name: Set up deploy SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Sync frontend source to the VPS
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new"
          DEST="${SSH_USER}@${SSH_HOST}:/var/www/flowpost/frontend"
          rsync -az --delete -e "$SSH" frontend/src/ "$DEST/src/"
          rsync -az -e "$SSH" \
            frontend/index.html frontend/package.json frontend/package-lock.json frontend/vite.config.js \
            "$DEST/"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Rebuild frontend on the VPS
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            'set -e; cd /var/www/flowpost/frontend && npm install --prefer-offline --no-audit --no-fund && npm run build && echo BUILD_OK'
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
