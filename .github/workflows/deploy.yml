name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run DB migrations'
        required: false
        default: 'true'
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP=/var/www/flowpost
            ENV="$APP/.env"

            # Load DB creds from .env on the server — no secrets needed in GitHub
            DB_USER=$(grep -E '^DB_USER=' "$ENV" | cut -d= -f2 | tr -d '"' | tr -d "'")
            DB_PASS=$(grep -E '^DB_PASS=' "$ENV" | cut -d= -f2 | tr -d '"' | tr -d "'")
            DB_NAME=$(grep -E '^DB_NAME=' "$ENV" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'" || echo flowpost)

            echo "==> Pulling latest code"
            cd "$APP"
            git fetch origin main
            git checkout main
            git pull origin main

            if [[ "$RUN_MIGRATIONS" == "true" ]]; then
              echo "==> Running migrations"
              for f in "$APP"/backend/migrations/*.sql; do
                fname=$(basename "$f")
                applied=$(mysql -u"$DB_USER" -p"$DB_PASS" "$DB_NAME" \
                  -sse "SELECT COUNT(*) FROM _migrations WHERE name='$fname' LIMIT 1" 2>/dev/null || echo 0)
                if [[ "$applied" -eq 0 ]]; then
                  echo "  Applying $fname"
                  mysql -u"$DB_USER" -p"$DB_PASS" "$DB_NAME" < "$f"
                  mysql -u"$DB_USER" -p"$DB_PASS" "$DB_NAME" \
                    -e "INSERT IGNORE INTO _migrations (name, applied_at) VALUES ('$fname', NOW())"
                else
                  echo "  Skipping $fname (already applied)"
                fi
              done
            fi

            echo "==> Building frontend"
            cd "$APP/frontend"
            npm ci --prefer-offline
            npm run build
            rsync -a --delete "$APP/frontend/dist/" "$APP/public/"

            echo "==> Reloading PHP-FPM"
            systemctl reload php8.3-fpm 2>/dev/null \
              || systemctl reload php8.2-fpm 2>/dev/null \
              || true

            echo "==> Reloading nginx"
            nginx -t && systemctl reload nginx

            echo "==> Done — $(git rev-parse --short HEAD)"
        env:
          RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations || 'true' }}
