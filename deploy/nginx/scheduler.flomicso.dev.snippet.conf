# =============================================================================
# nginx hardening + caching ADDITIONS for scheduler.flomicso.dev
# =============================================================================
# This is intentionally NOT a full server block. Your existing config already
# routes /api/ to PHP correctly (verified live: /api returns JSON, 401 without
# auth) and that wiring must not be disturbed. Only ADD the pieces below to your
# current `server { ... }` for scheduler.flomicso.dev.
#
# Files referenced:
#   /etc/nginx/snippets/flomipost-security-headers.conf  (from security-headers.conf)
#
# After editing:  nginx -t  &&  systemctl reload nginx
# -----------------------------------------------------------------------------

# 0) LINK-SHORTENER REDIRECT (functional fix — broken tracked links) ----------
#    The composer's "Shorten" button stores links as <APP_URL>/s/{code} and
#    embeds that URL in published posts. The handler that 302-redirects to the
#    real destination AND records the click is an API route — the PHP router is
#    mounted under /api, so the handler only answers at /api/s/{code}.
#
#    Your existing config routes only /api/* to PHP; everything else hits the
#    SPA fallback (try_files ... /index.html). So a click on /s/{code} returns
#    the React shell instead of redirecting: every tracked link is dead AND
#    every link shows 0 clicks (the click-logging code never runs). See
#    docs/SECURITY-HARDENING.md item 5.
#
#    Fix: internally rewrite the public short path into the API namespace that
#    already reaches PHP, so existing and future short links resolve and links
#    stay short. `last` re-runs location matching so this lands on the /api
#    handler. Short codes are 8 chars of [A-Za-z0-9] with no slashes, and no
#    SPA/static path begins with `/s/` (note: /storage/ and /sites do NOT, they
#    lack the slash after `s`), so this prefix match is safe.
location ^~ /s/ {
    rewrite ^/s/(.+)$ /api/s/$1 last;
}

# 1) Inside the server block (top level), pull in the security headers so they
#    apply to the SPA shell (index.html) and any response without its own
#    add_header:
#
#        include /etc/nginx/snippets/flomipost-security-headers.conf;

# 2) Make the SPA shell always revalidate so a new deploy is picked up
#    immediately (otherwise users can run stale JS that points at deleted
#    asset hashes):
location = /index.html {
    add_header Cache-Control "no-cache" always;
    include /etc/nginx/snippets/flomipost-security-headers.conf;  # re-add: see note in that file
    try_files $uri =404;
}

# 3) Content-hashed build assets are immutable -> cache hard. Today they ship
#    with NO Cache-Control, so browsers revalidate on every visit (wasteful
#    304 round-trips). The filename hash changes on every build, so a 1-year
#    immutable cache is safe.
location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    include /etc/nginx/snippets/flomipost-security-headers.conf;  # re-add: see note in that file
    try_files $uri =404;
}

# 4) robots.txt: deploy/public/robots.txt must exist in the web root
#    (/var/www/flowpost/public/robots.txt). Once the real file is present your
#    existing SPA fallback (try_files $uri ... /index.html) will serve it
#    correctly instead of returning the HTML shell. No location block needed,
#    but this makes the intent explicit and skips the SPA fallback:
location = /robots.txt {
    include /etc/nginx/snippets/flomipost-security-headers.conf;
    try_files $uri =404;
}

# 5) (Optional, recommended) Hide any accidentally-deployed dotfiles such as a
#    stray .env, .git, etc. from being served as static files:
location ~ /\.(?!well-known) {
    deny all;
}

# -----------------------------------------------------------------------------
# OPTIONAL: Brotli (better compression than gzip for JS/CSS, ~15-20% smaller).
# Requires the ngx_brotli module to be installed. gzip is already enabled.
#   brotli on;
#   brotli_comp_level 6;
#   brotli_types text/plain text/css application/javascript application/json image/svg+xml;
# -----------------------------------------------------------------------------
