# =============================================================================
# Security headers for scheduler.flomicso.dev
# =============================================================================
# Drop this file at /etc/nginx/snippets/flomipost-security-headers.conf and
# `include` it inside the server block AND inside every `location` block that
# sets its own add_header (see snippet file for why this is required).
#
# IMPORTANT nginx behaviour: add_header directives are NOT inherited into a
# location block that defines any add_header of its own. That is why these are
# packaged as an include and pulled into each location rather than relying on
# inheritance.
# -----------------------------------------------------------------------------

# Stops MIME-type sniffing (defends against content-type confusion attacks).
add_header X-Content-Type-Options "nosniff" always;

# Disallow being framed anywhere (clickjacking). CSP frame-ancestors below is
# the modern equivalent; both are sent for older-browser coverage.
add_header X-Frame-Options "DENY" always;

# Don't leak full URLs (which can contain tokens) to third parties.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Lock down powerful browser features this app does not use from the top frame.
# (Twilio Voice click-to-call needed the microphone, but Twilio has been
# scrapped, so microphone stays disabled.)
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# Force HTTPS for two years including subdomains. Only enable `preload` once you
# are certain every flomicso.dev subdomain can serve HTTPS — preload is hard to
# undo. Start WITHOUT preload if unsure.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# -----------------------------------------------------------------------------
# Content-Security-Policy
# -----------------------------------------------------------------------------
# Ship in REPORT-ONLY first. Watch the browser console / your report endpoint
# for a few days, widen the directives to cover any third-party origins the app
# legitimately uses (analytics, media CDN, Twilio Voice SDK CDN, fonts), THEN
# switch the header name to `Content-Security-Policy` to enforce.
#
# Known third parties to account for before enforcing (from build notes):
#   - Google Analytics / GA embeds            -> add to script-src/img-src/connect-src
#   (Twilio Voice SDK CDN is no longer needed — Twilio/SMS has been scrapped.)
# Tighten 'unsafe-inline' on style-src later by moving inline styles to classes.
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
